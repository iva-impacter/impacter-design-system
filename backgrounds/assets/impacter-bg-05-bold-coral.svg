  </g>
  <circle cx="1180" cy="300" r="4.5" fill="#FFFFFF" fill-opacity="0.5"/>
  <circle cx="1300" cy="540" r="4.5" fill="#FFFFFF" fill-opacity="0.35"/>
  <rect width="1440" height="720" filter="url(#e5-grain)" opacity="0.10" style="mix-blend-mode:soft-light"/>
