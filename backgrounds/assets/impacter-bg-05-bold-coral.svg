<svg viewBox="0 0 1440 720" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="e5-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF7E64"/>
      <stop offset="0.55" stop-color="#F55F4E"/>
      <stop offset="1" stop-color="#D8422F"/>
    </linearGradient>
    <radialGradient id="e5-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFB199" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFB199" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="e5-navy" cx="0.5" cy="0.5" r="0.5">
