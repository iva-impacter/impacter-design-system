    <rect x="1200" y="80" width="200" height="200" rx="36"/>
    <rect x="1080" y="320" width="200" height="200" rx="36"/>
    <rect x="1320" y="320" width="200" height="200" rx="36"/>
    <rect x="960" y="560" width="200" height="200" rx="36"/>
