      <stop offset="0" stop-color="#0C2444"/>
      <stop offset="0.35" stop-color="#33395F"/>
      <stop offset="0.62" stop-color="#8A4E67"/>
      <stop offset="0.85" stop-color="#E86E5F"/>
      <stop offset="1" stop-color="#FF8A6B"/>
